<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk - PixelForge AI</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="style-login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-body">

<div class="auth-wrapper">
  <div class="auth-left">
    <div class="auth-brand">
      <a href="../index.html" class="logo">PIXELFORGE <span>AI</span></a>
      <p>Ubah imajinasi Anda menjadi visual menakjubkan dengan kekuatan AI.</p>
    </div>
    <img src="../images/tm-pixel-forge-09.jpg" alt="AI Art" class="auth-art" />
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <h2>Selamat Datang Kembali</h2>
      <p class="auth-sub">Masuk ke akun PixelForge Anda</p>

      <div id="alertMsg" class="alert-msg" style="display:none;"></div>

      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> Nama Pengguna</label>
          <input type="text" id="username" name="username" placeholder="Masukkan nama pengguna" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Kata Sandi</label>
          <div class="input-eye">
            <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="togglePassword('password','eyeIcon')">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary btn-full" id="btnMasuk" onclick="loginUser()">
          <span id="btnMasukText">Masuk</span>
        </button>
      </form>

      <p class="auth-switch">Belum punya akun? <a href="register.html">Daftar di sini</a></p>
      <p class="auth-hint"><small>Demo: username <strong>heri</strong> / password <strong>123</strong><br>Admin: username <strong>admin</strong> / password <strong>123</strong></small></p>
      <a href="../index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
