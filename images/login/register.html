<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar - PixelForge AI</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="style-login.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-body">

<div class="auth-wrapper">
  <div class="auth-left">
    <div class="auth-brand">
      <a href="../index.html" class="logo">PIXELFORGE <span>AI</span></a>
      <p>Bergabunglah dengan jutaan kreator yang menggunakan PixelForge setiap hari.</p>
    </div>
    <img src="../images/tm-pixel-forge-02.jpg" alt="AI Art" class="auth-art" />
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <h2>Buat Akun Baru</h2>
      <p class="auth-sub">Daftar gratis dan mulai berkreasi!</p>

      <div id="alertMsg" class="alert-msg" style="display:none;"></div>

      <form id="registerForm" onsubmit="return false;">
        <div class="form-group">
          <label for="username"><i class="fas fa-user"></i> Nama Pengguna</label>
          <input type="text" id="username" name="username" placeholder="Pilih nama pengguna unik" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Alamat Email</label>
          <input type="email" id="email" name="email" placeholder="contoh@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Kata Sandi</label>
          <div class="input-eye">
            <input type="password" id="password" name="password" placeholder="Buat kata sandi yang kuat" required autocomplete="new-password" />
            <button type="button" class="eye-btn" onclick="togglePassword('password','eyeIcon2')">
              <i class="fas fa-eye" id="eyeIcon2"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary btn-full" id="btnDaftar" onclick="registerUser()">
          <span id="btnDaftarText">Daftar Sekarang</span>
        </button>
      </form>

      <p class="auth-switch">Sudah punya akun? <a href="index.html">Masuk di sini</a></p>
      <a href="../index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>
  </div>
</div>

<script src="js/register.js"></script>
</body>
</html>
